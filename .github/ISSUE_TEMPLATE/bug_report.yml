name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module is affected?
      options:
        - Login / Auth
        - Dashboard
        - Patients
        - Staff
        - Departments
        - Appointments
        - Billing
        - Bed Management
        - Rostering
        - Radiology
        - Notifications
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical (blocks usage)
        - High (important, fix soon)
        - Medium (should fix, not urgent)
        - Low (nice to have)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly
      placeholder: "When I click X, Y happens instead of Z"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Attach screenshots if applicable

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Staging (medixar.daiviksoft.com)
        - Local development
    validations:
      required: true
